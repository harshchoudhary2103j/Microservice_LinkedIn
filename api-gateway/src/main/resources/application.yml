spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          routes:


            - id: post-service
              uri: lb://POST-SERVICE
              predicates:
                - Path=api/v1/posts/**
              filters:
                - StripPrefix=2




            - id: user-service
              uri: lb://USERSERVICE
              predicates:
                - Path=api/v1/users/**
              filters:
                - StripPrefix=2


            - id: connection-service
              uri: lb://CONNECTION-SERVICE
              predicates:
                - Path=api/v1/connections/**
              filters:
                - StripPrefix=2



eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true

server.port: 8081
